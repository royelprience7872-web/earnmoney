<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EasyEarn Premium | Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src='//libtl.com/sdk.js' data-zone='10950109' data-sdk='show_10950109'></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Outfit:wght@500;700;800&display=swap');

        :root {
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
        }

        body {
            background: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Hind Siliguri', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .font-outfit { font-family: 'Outfit', sans-serif; }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
        }

        .premium-card {
            background: linear-gradient(135deg, #1e4ed8 0%, #7e22ce 100%);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(30, 64, 175, 0.3);
            position: relative;
            overflow: hidden;
        }

        .premium-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .btn-press:active { transform: scale(0.96); transition: 0.1s; }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        input, select {
            background: #0f172a !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
            padding: 16px;
            border-radius: 18px;
            width: 100%;
            outline: none;
            font-weight: 600;
        }

        input:focus { border-color: var(--primary) !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        .nav-item.active i { color: var(--primary); transform: translateY(-3px); }
        .nav-item.active span { color: var(--primary); }
    </style>
</head>
<body class="p-5 pb-36">

    <h1 style="text-align:center;margin-top:50px;">EasyEarn Premium Dashboard Ready</h1>

</body>
</html>
